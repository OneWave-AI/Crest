<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f0f"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>

    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cc785c"/>
      <stop offset="50%" stop-color="#e8956e"/>
      <stop offset="100%" stop-color="#d4845f"/>
    </linearGradient>

    <radialGradient id="glow" cx="50%" cy="42%" r="35%">
      <stop offset="0%" stop-color="#e8956e" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#e8956e" stop-opacity="0"/>
    </radialGradient>

    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feFlood flood-color="#e8956e" flood-opacity="0.2"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>
  <rect width="1024" height="1024" rx="224" fill="url(#glow)"/>

  <!-- Subtle border -->
  <rect width="1024" height="1024" rx="224" fill="none" stroke="#cc785c" stroke-width="2" opacity="0.08"/>

  <!-- Main wave — single bold flowing curve -->
  <path
    d="M 180 580
       C 260 580, 320 540, 380 470
       C 430 410, 470 330, 512 260
       C 554 330, 594 410, 644 470
       C 704 540, 764 580, 844 580"
    fill="none"
    stroke="url(#wave)"
    stroke-width="52"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#softGlow)"
  />

  <!-- Spray dots at the crest peak — 3 dots ascending -->
  <circle cx="492" cy="218" r="10" fill="#e8956e" opacity="0.7"/>
  <circle cx="512" cy="195" r="12" fill="#e8956e" opacity="0.5"/>
  <circle cx="532" cy="218" r="10" fill="#e8956e" opacity="0.7"/>

  <!-- Tiny mist dots -->
  <circle cx="475" cy="240" r="6" fill="#cc785c" opacity="0.3"/>
  <circle cx="549" cy="240" r="6" fill="#cc785c" opacity="0.3"/>
  <circle cx="512" cy="175" r="7" fill="#e8956e" opacity="0.3"/>

  <!-- Reflection line below wave — subtle -->
  <path
    d="M 280 660 C 380 640, 460 635, 512 630 C 564 635, 644 640, 744 660"
    fill="none"
    stroke="url(#wave)"
    stroke-width="6"
    stroke-linecap="round"
    opacity="0.15"
  />
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Dark background gradient -->
    <linearGradient id="bgDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#111111"/>
      <stop offset="100%" stop-color="#000000"/>
    </linearGradient>

    <!-- Coral/orange accent gradient -->
    <linearGradient id="coral" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#cc785c"/>
      <stop offset="100%" stop-color="#e8956e"/>
    </linearGradient>

    <!-- Soft glow filter -->
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feFlood flood-color="#e8956e" flood-opacity="0.25"/>
      <feComposite in2="blur" operator="in"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bgDark)"/>

  <!-- Main bold wave crest stroke - thicker for favicon legibility -->
  <path
    d="M 180 610
       C 275 610, 350 580, 420 510
       C 468 462, 495 395, 512 295
       C 529 395, 556 462, 604 510
       C 674 580, 749 610, 844 610"
    fill="none"
    stroke="url(#coral)"
    stroke-width="58"
    stroke-linecap="round"
    stroke-linejoin="round"
    filter="url(#glow)"
  />

  <!-- Simplified dot trail for small sizes - fewer, bolder dots -->
  <circle cx="280" cy="695" r="14" fill="#cc785c" opacity="0.3"/>
  <circle cx="345" cy="678" r="18" fill="#d48464" opacity="0.4"/>
  <circle cx="412" cy="648" r="22" fill="#dc906c" opacity="0.55"/>
  <circle cx="468" cy="600" r="26" fill="#e4986e" opacity="0.7"/>
  <circle cx="512" cy="545" r="28" fill="#e8956e" opacity="0.85"/>
  <circle cx="556" cy="600" r="26" fill="#e4986e" opacity="0.7"/>
  <circle cx="612" cy="648" r="22" fill="#dc906c" opacity="0.55"/>
  <circle cx="679" cy="678" r="18" fill="#d48464" opacity="0.4"/>
  <circle cx="744" cy="695" r="14" fill="#cc785c" opacity="0.3"/>
</svg>

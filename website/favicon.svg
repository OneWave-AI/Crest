<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f0f0f"/>
      <stop offset="100%" stop-color="#050505"/>
    </linearGradient>
    <linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#cc785c"/>
      <stop offset="50%" stop-color="#e8956e"/>
      <stop offset="100%" stop-color="#d4845f"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- Bold wave — thicker for small sizes -->
  <path
    d="M 165 590
       C 250 590, 320 545, 385 465
       C 435 400, 475 320, 512 245
       C 549 320, 589 400, 639 465
       C 704 545, 774 590, 859 590"
    fill="none"
    stroke="url(#wave)"
    stroke-width="64"
    stroke-linecap="round"
    stroke-linejoin="round"
  />

  <!-- Peak spray — 3 dots, larger for legibility -->
  <circle cx="490" cy="200" r="14" fill="#e8956e" opacity="0.7"/>
  <circle cx="512" cy="175" r="16" fill="#e8956e" opacity="0.5"/>
  <circle cx="534" cy="200" r="14" fill="#e8956e" opacity="0.7"/>
</svg>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<title>Crest OG Preview - 1200x630</title>
<style>
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  html, body {
    width: 1200px;
    height: 630px;
    overflow: hidden;
    background: #030303;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'SF Pro Display', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }

  .og-container {
    width: 1200px;
    height: 630px;
    position: relative;
    overflow: hidden;
    background: #030303;
  }

  .dot-canvas {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
  }

  .bg-glow {
    position: absolute;
    top: 30%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 800px;
    height: 450px;
    background: radial-gradient(ellipse at center, rgba(204, 120, 92, 0.07) 0%, transparent 65%);
    pointer-events: none;
  }

  .bg-glow-wave {
    position: absolute;
    bottom: -40px;
    left: 50%;
    transform: translateX(-50%);
    width: 1100px;
    height: 350px;
    background: radial-gradient(ellipse at center, rgba(204, 120, 92, 0.045) 0%, transparent 55%);
    pointer-events: none;
  }

  .top-accent {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 2px;
    background: linear-gradient(90deg, transparent 15%, #cc785c 40%, #e8956e 50%, #cc785c 60%, transparent 85%);
    opacity: 0.45;
  }

  .content {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 10;
    padding-bottom: 60px;
  }

  .logo-mark {
    margin-bottom: 20px;
    opacity: 0.95;
  }

  .title {
    font-size: 88px;
    font-weight: 800;
    color: #ffffff;
    letter-spacing: -3px;
    line-height: 1;
    margin-bottom: 16px;
  }

  .tagline {
    font-size: 26px;
    font-weight: 500;
    background: linear-gradient(135deg, #cc785c, #e8956e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    letter-spacing: 0.3px;
  }

  .byline {
    position: absolute;
    bottom: 30px;
    left: 50%;
    transform: translateX(-50%);
    font-size: 13px;
    font-weight: 500;
    color: #444;
    letter-spacing: 2px;
    text-transform: uppercase;
    z-index: 10;
  }

  .corner {
    position: absolute;
    width: 28px;
    height: 28px;
    opacity: 0.1;
    z-index: 10;
  }
  .corner-tl { top: 24px; left: 24px; border-top: 1px solid #cc785c; border-left: 1px solid #cc785c; }
  .corner-tr { top: 24px; right: 24px; border-top: 1px solid #cc785c; border-right: 1px solid #cc785c; }
  .corner-bl { bottom: 24px; left: 24px; border-bottom: 1px solid #cc785c; border-left: 1px solid #cc785c; }
  .corner-br { bottom: 24px; right: 24px; border-bottom: 1px solid #cc785c; border-right: 1px solid #cc785c; }
</style>
</head>
<body>
<div class="og-container">

  <div class="bg-glow"></div>
  <div class="bg-glow-wave"></div>
  <div class="top-accent"></div>

  <canvas id="dotCanvas" class="dot-canvas" width="1200" height="630"></canvas>

  <div class="corner corner-tl"></div>
  <div class="corner corner-tr"></div>
  <div class="corner corner-bl"></div>
  <div class="corner corner-br"></div>

  <div class="content">
    <!-- Wave crest logo mark built from dots -->
    <div class="logo-mark">
      <svg width="60" height="38" viewBox="0 0 60 38" fill="none" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <linearGradient id="logoGrad" x1="0" y1="0" x2="60" y2="38" gradientUnits="userSpaceOnUse">
            <stop stop-color="#cc785c"/>
            <stop offset="1" stop-color="#e8956e"/>
          </linearGradient>
        </defs>
        <!-- Primary crest arc of dots -->
        <circle cx="3"  cy="28" r="2.0" fill="url(#logoGrad)" opacity="0.40"/>
        <circle cx="10" cy="22" r="2.3" fill="url(#logoGrad)" opacity="0.55"/>
        <circle cx="18" cy="14" r="2.6" fill="url(#logoGrad)" opacity="0.70"/>
        <circle cx="26" cy="7"  r="2.9" fill="url(#logoGrad)" opacity="0.85"/>
        <circle cx="30" cy="4"  r="3.2" fill="url(#logoGrad)" opacity="1.0"/>
        <circle cx="34" cy="7"  r="2.9" fill="url(#logoGrad)" opacity="0.85"/>
        <circle cx="42" cy="14" r="2.6" fill="url(#logoGrad)" opacity="0.70"/>
        <circle cx="50" cy="22" r="2.3" fill="url(#logoGrad)" opacity="0.55"/>
        <circle cx="57" cy="28" r="2.0" fill="url(#logoGrad)" opacity="0.40"/>
        <!-- Secondary trough dots -->
        <circle cx="10" cy="35" r="1.4" fill="url(#logoGrad)" opacity="0.18"/>
        <circle cx="22" cy="32" r="1.6" fill="url(#logoGrad)" opacity="0.22"/>
        <circle cx="30" cy="30" r="1.7" fill="url(#logoGrad)" opacity="0.25"/>
        <circle cx="38" cy="32" r="1.6" fill="url(#logoGrad)" opacity="0.22"/>
        <circle cx="50" cy="35" r="1.4" fill="url(#logoGrad)" opacity="0.18"/>
      </svg>
    </div>

    <div class="title">Crest</div>
    <div class="tagline">Code with Superpowers</div>
  </div>

  <div class="byline">by OneWave AI</div>

</div>

<script>
(function() {
  const canvas = document.getElementById('dotCanvas');
  const ctx = canvas.getContext('2d');
  const W = 1200;
  const H = 630;

  // Coral gradient color interpolation
  function coral(t, alpha) {
    const r = Math.round(204 + (232 - 204) * t);
    const g = Math.round(120 + (149 - 120) * t);
    const b = Math.round(92 + (110 - 92) * t);
    return 'rgba(' + r + ',' + g + ',' + b + ',' + alpha + ')';
  }

  // Wave function
  function waveY(x, baseY, amp, freq, phase) {
    return baseY + amp * Math.sin(freq * x + phase);
  }

  // Edge fade helper
  function edgeFade(x, margin) {
    return Math.min(1, Math.min(x, W - x) / margin);
  }

  // ==============================
  // 1. BACKGROUND DOT GRID
  // ==============================
  // Uniform grid gives the CLI/matrix/terminal aesthetic
  var spacing = 20;
  for (var gx = spacing; gx < W; gx += spacing) {
    for (var gy = spacing; gy < H; gy += spacing) {
      ctx.beginPath();
      ctx.arc(gx, gy, 0.5, 0, Math.PI * 2);
      ctx.fillStyle = 'rgba(255,255,255,0.03)';
      ctx.fill();
    }
  }

  // ==============================
  // 2. OCEAN WAVE DOT LINES
  // ==============================
  // Multiple wave rows of dots, each with different parameters
  // Creating a layered ocean surface in the lower half

  var waveConfigs = [
    // { baseY, amplitude, frequency, phase, dotGap, maxR, maxAlpha }
    { baseY: 410, amp: 40, freq: 0.0042, phase: 0,    gap: 8,  maxR: 2.6, maxA: 0.50 },
    { baseY: 430, amp: 34, freq: 0.0048, phase: 0.7,  gap: 9,  maxR: 2.3, maxA: 0.38 },
    { baseY: 452, amp: 28, freq: 0.0038, phase: 1.6,  gap: 10, maxR: 2.0, maxA: 0.28 },
    { baseY: 474, amp: 24, freq: 0.0053, phase: 2.4,  gap: 11, maxR: 1.8, maxA: 0.20 },
    { baseY: 496, amp: 20, freq: 0.0044, phase: 3.3,  gap: 12, maxR: 1.6, maxA: 0.14 },
    { baseY: 518, amp: 16, freq: 0.0058, phase: 4.1,  gap: 14, maxR: 1.4, maxA: 0.09 },
    { baseY: 540, amp: 12, freq: 0.0035, phase: 5.0,  gap: 16, maxR: 1.2, maxA: 0.06 },
  ];

  for (var wi = 0; wi < waveConfigs.length; wi++) {
    var w = waveConfigs[wi];
    for (var x = 0; x <= W; x += w.gap) {
      var y = waveY(x, w.baseY, w.amp, w.freq, w.phase);
      var ef = edgeFade(x, 180);

      // Height-based intensity (dots near peaks are brighter)
      var normH = 1 - (y - (w.baseY - w.amp)) / (2 * w.amp);
      normH = Math.max(0, Math.min(1, normH));
      var intensity = 0.35 + 0.65 * normH;

      var alpha = w.maxA * intensity * ef;
      var radius = w.maxR * (0.5 + 0.5 * intensity) * (0.7 + 0.3 * ef);

      if (alpha > 0.008) {
        ctx.beginPath();
        ctx.arc(x, y, radius, 0, Math.PI * 2);
        ctx.fillStyle = coral(x / W, alpha);
        ctx.fill();
      }
    }
  }

  // ==============================
  // 3. FOAM / CREST LINE PARTICLES
  // ==============================
  // Dense small dots packed along the primary wave crest

  for (var fx = 40; fx <= W - 40; fx += 3) {
    var fBaseY = waveY(fx, 410, 40, 0.0042, 0);
    var dotsHere = 2 + Math.floor(Math.random() * 2);
    for (var d = 0; d < dotsHere; d++) {
      var oy = (Math.random() - 0.5) * 10;
      var ox = (Math.random() - 0.5) * 2.5;
      var fa = (0.06 + Math.random() * 0.16) * edgeFade(fx, 140);
      var fr = 0.3 + Math.random() * 0.8;
      if (fa > 0.01) {
        ctx.beginPath();
        ctx.arc(fx + ox, fBaseY + oy, fr, 0, Math.PI * 2);
        ctx.fillStyle = coral(fx / W, fa);
        ctx.fill();
      }
    }
  }

  // ==============================
  // 4. SPRAY / MIST PARTICLES
  // ==============================
  // Scattered dots rising above the main crest, like ocean spray

  for (var si = 0; si < 220; si++) {
    var sx = 80 + Math.random() * (W - 160);
    var sBaseY = waveY(sx, 410, 40, 0.0042, 0);
    var rise = Math.random() * Math.random() * 130;
    var sy = sBaseY - rise - 4;
    var jx = (Math.random() - 0.5) * 6;

    var sa = Math.max(0, 0.30 - rise * 0.0025) * (0.3 + Math.random() * 0.7) * edgeFade(sx, 180);
    var sr = 0.4 + Math.random() * 1.3 * (1 - rise / 130);

    if (sa > 0.008) {
      ctx.beginPath();
      ctx.arc(sx + jx, sy, sr, 0, Math.PI * 2);
      ctx.fillStyle = coral(sx / W, sa);
      ctx.fill();
    }
  }

  // ==============================
  // 5. DEEP OCEAN FILL DOTS
  // ==============================
  // Sparse dots below wave lines, fading into the deep

  for (var dx = 20; dx <= W - 20; dx += 14) {
    var dTopY = waveY(dx, 410, 40, 0.0042, 0) + 25;
    for (var dy = dTopY; dy < H + 10; dy += 14 + Math.random() * 8) {
      var depth = (dy - dTopY) / (H - dTopY + 10);
      var da = Math.max(0, 0.10 * (1 - depth * depth)) * edgeFade(dx, 100);
      var dr = 0.4 + (1 - depth) * 1.0;

      var jdx = (Math.random() - 0.5) * 8;
      var jdy = (Math.random() - 0.5) * 5;

      if (da > 0.005) {
        ctx.beginPath();
        ctx.arc(dx + jdx, dy + jdy, dr, 0, Math.PI * 2);
        ctx.fillStyle = coral(dx / W, da);
        ctx.fill();
      }
    }
  }

  // ==============================
  // 6. GRID-WAVE INTERACTION
  // ==============================
  // Grid dots near the waves glow brighter, creating a "data reacting to ocean" effect

  for (var ix = spacing; ix < W; ix += spacing) {
    for (var iy = spacing; iy < H; iy += spacing) {
      var minDist = 999;
      for (var iw = 0; iw < 3; iw++) {
        var wc = waveConfigs[iw];
        var wy = waveY(ix, wc.baseY, wc.amp, wc.freq, wc.phase);
        var dd = Math.abs(iy - wy);
        if (dd < minDist) minDist = dd;
      }
      if (minDist < 24) {
        var prox = 1 - minDist / 24;
        var ia = prox * 0.13 * edgeFade(ix, 140);
        var ir = 0.5 + prox * 1.1;
        ctx.beginPath();
        ctx.arc(ix, iy, ir, 0, Math.PI * 2);
        ctx.fillStyle = coral(ix / W, ia);
        ctx.fill();
      }
    }
  }

  // ==============================
  // 7. UPPER ATMOSPHERE PARTICLES
  // ==============================
  // A few stray dots in the sky area for depth

  for (var ui = 0; ui < 30; ui++) {
    var ux = 60 + Math.random() * (W - 120);
    var uy = 30 + Math.random() * 260;
    var ua = 0.02 + Math.random() * 0.04;
    var ur = 0.4 + Math.random() * 0.6;

    ctx.beginPath();
    ctx.arc(ux, uy, ur, 0, Math.PI * 2);
    ctx.fillStyle = coral(Math.random(), ua);
    ctx.fill();
  }

})();
</script>
</body>
</html>
